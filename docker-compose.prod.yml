services:
  # ── PostgreSQL Database ─────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-nuujf}
      POSTGRES_USER: ${DB_USER:-nuujf_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-nuujf_user} -d ${DB_NAME:-nuujf}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  # ── Redis Cache ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  # ── Django Web Application (Gunicorn) ───────────────────────
  web:
    image: ${REGISTRY:-ghcr.io}/zetmax1/nuujf_back:${IMAGE_TAG:-latest}
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - DB_HOST=db
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
    ports:
      - "127.0.0.1:8086:8086"
    volumes:
      # Bind mounts — host Nginx reads these directories directly
      - /var/www/NuujfNew/media:/app/media
      - /var/www/NuujfNew/static:/app/static
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  # ── Telegram Bot ────────────────────────────────────────────
  telegram-bot:
    image: ${REGISTRY:-ghcr.io}/zetmax1/nuujf_back:${IMAGE_TAG:-latest}
    entrypoint: ["python", "manage.py", "run_telegram_bot"]
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - DB_HOST=db
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
    volumes:
      - /var/www/NuujfNew/media:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  # ── Frontend (React/Vite SPA served by internal Nginx) ──────
  frontend:
    image: ${REGISTRY:-ghcr.io}/zetmax1/nuujf_front:${IMAGE_TAG:-latest}
    ports:
      - "127.0.0.1:5175:87"
    restart: unless-stopped
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:

networks:
  internal:
    driver: bridge
