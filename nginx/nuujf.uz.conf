# ══════════════════════════════════════════════════════════════
# Production Nginx — Reverse Proxy & SSL Termination
# File: /etc/nginx/sites-available/nuujf.uz
# Symlink: ln -s /etc/nginx/sites-available/nuujf.uz /etc/nginx/sites-enabled/
# ══════════════════════════════════════════════════════════════

# ── Redirect HTTP → HTTPS ──────────────────────────────────────
server {
    listen 86;
    server_name nuujf.uz www.nuujf.uz api.nuujf.uz;

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Frontend — nuujf.uz (React SPA) ───────────────────────────
server {
    listen 443 ssl http2;
    server_name nuujf.uz www.nuujf.uz;

    ssl_certificate     /etc/letsencrypt/live/nuujf.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nuujf.uz/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://api.nuujf.uz; connect-src 'self' https://api.nuujf.uz;" always;

    # Proxy to frontend Docker container
    location / {
        proxy_pass         http://127.0.0.1:5175;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    access_log /var/log/nginx/nuujf_frontend_access.log;
    error_log  /var/log/nginx/nuujf_frontend_error.log;
}

# ── Backend API — api.nuujf.uz (Django/Gunicorn) ──────────────
server {
    listen 443 ssl http2;
    server_name api.nuujf.uz;

    ssl_certificate     /etc/letsencrypt/live/nuujf.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nuujf.uz/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # File upload limit (for Wagtail media/documents)
    client_max_body_size 100M;

    # ── Static files (WhiteNoise handles this, but Nginx is faster) ──
    location /static/ {
        alias /var/www/NuujfNew/static/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # ── Media files ────────────────────────────────────────────
    location /media/ {
        alias /var/www/NuujfNew/media/;
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # ── Django application ─────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8086;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    access_log /var/log/nginx/nuujf_backend_access.log;
    error_log  /var/log/nginx/nuujf_backend_error.log;
}
