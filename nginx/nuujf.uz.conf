server {
    listen 80;
    listen [::]:80;
    server_name new.jbnuu.uz www.new.jbnuu.uz api.jbnuu.uz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name new.jbnuu.uz www.new.jbnuu.uz api.jbnuu.uz;

    # SSL sertifikatlar
    ssl_certificate /etc/ssl/jbnuu.uz/fullchain.pem;
    ssl_certificate_key /etc/ssl/jbnuu.uz/jbnuu.uz.key;
    ssl_trusted_certificate /etc/ssl/jbnuu.uz/ca-bundle.crt;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 100M;

    # ── Gzip compression ──────────────────────────────────────────
    # Compresses API JSON, HTML, CSS, JS responses before sending.
    # Reduces payload size by 60-80% for text-based content.
    gzip on;
    gzip_vary on;           # Tells CDN/proxies to cache separately for gzip
    gzip_proxied any;       # Compress for all proxied requests
    gzip_comp_level 6;      # Good balance between CPU and compression ratio
    gzip_min_length 1024;   # Don't compress very small responses (<1KB)
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml;

    # ── Frontend (React SPA) ───────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:5175;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Keep connections alive to frontend container
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── Backend (API va Admin) ────────────────────────────────────
    location ~ ^/(api|admin|django-admin|documents) {
        proxy_pass http://127.0.0.1:8086;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # HTTP/1.1 keepalive to Gunicorn — avoids TCP reconnect per request
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        # Buffer tweaks for API responses
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 16 8k;
    }

    # ── Static fayllar ────────────────────────────────────────────
    # Served directly by Nginx (not through Django/Gunicorn).
    # Hashed filenames (e.g. main.abc123.js) → immutable, 1-year cache.
    location /static/ {
        alias /var/www/NuujfNew/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;     # Don't fill logs with static file hits
    }

    # ── Media fayllar ────────────────────────────────────────────
    # User-uploaded content — shorter cache since files can be replaced.
    location /media/ {
        alias /var/www/NuujfNew/media/;
        expires 7d;
        add_header Cache-Control "public, must-revalidate";
        add_header Vary "Accept-Encoding";
        access_log off;
    }
}
