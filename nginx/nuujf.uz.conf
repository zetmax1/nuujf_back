# 1. Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name new.jbnuu.uz www.new.jbnuu.uz api.jbnuu.uz;
    return 301 https://$host$request_uri;
}

# 2. Frontend Server (new.jbnuu.uz)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name new.jbnuu.uz www.new.jbnuu.uz;

    ssl_certificate /etc/ssl/jbnuu.uz/fullchain.pem;
    ssl_certificate_key /etc/ssl/jbnuu.uz/jbnuu.uz.key;
    ssl_trusted_certificate /etc/ssl/jbnuu.uz/ca-bundle.crt;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 100M;

    location / {
        # FIX: Changed localhost to 127.0.0.1 to avoid IPv6 issues
        proxy_pass http://127.0.0.1:5175;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# 3. Backend API Server (api.jbnuu.uz)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.jbnuu.uz;

    ssl_certificate /etc/ssl/jbnuu.uz/fullchain.pem;
    ssl_certificate_key /etc/ssl/jbnuu.uz/jbnuu.uz.key;
    ssl_trusted_certificate /etc/ssl/jbnuu.uz/ca-bundle.crt;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 100M;

    location / {
        # FIX: Changed localhost to 127.0.0.1
        proxy_pass http://127.0.0.1:8086;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /var/www/NuujfNew/static/;
    }

    location /media/ {  
      alias /var/www/NuujfNew/media/;
    }
}
