version: '3.8'

services:
  # Main web application (Gunicorn + Django/Wagtail)
  web:
    build: .
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    ports:
      - "8000:8000"
    volumes:
      - ./media:/app/media
      - ./db.sqlite3:/app/db.sqlite3
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      # Do NOT set TELEGRAM_BOT_ENABLED here — bot runs as separate service
    restart: unless-stopped

  # Telegram Bot (runs as a separate process)
  # Comment out this service to disable the bot
  telegram-bot:
    build: .
    command: python manage.py run_telegram_bot
    volumes:
      - ./media:/app/media
      - ./db.sqlite3:/app/db.sqlite3
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    depends_on:
      - web
    restart: unless-stopped
